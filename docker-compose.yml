services:
  postgres:
    image: postgres:16-alpine
    container_name: mission-analyzer-db
    environment:
      POSTGRES_DB: mission_analyzer
      POSTGRES_USER: mission
      POSTGRES_PASSWORD: mission
    ports:
      - "5432:5432"
    volumes:
      - mission_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission -d mission_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mission_pg_data:
